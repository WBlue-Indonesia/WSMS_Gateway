name: wsms_sender
description: "WSMS-Gateway Android sender — FCM-push-driven: receives send commands as high-priority data messages, sends SMS via dual-SIM, confirms over REST."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  permission_handler: ^12.0.0
  mobile_scanner: ^6.0.2
  # FCM + the device REST transport live natively (Kotlin: FcmService, DeviceApi).

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
