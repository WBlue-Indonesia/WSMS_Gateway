{{define "content"}}
{{$lang := .Lang}}
<div class="page-head">
  <div><h1>{{t $lang "messages.title"}}</h1><p class="muted">{{t $lang "messages.subtitle"}}</p></div>
</div>

<form class="filters msg-filters" hx-get="/admin/messages/rows" hx-target="#rows"
      hx-trigger="submit, change from:select, keyup delay:400ms from:input[name=q]" hx-push-url="false">
  <input type="search" name="q" placeholder="{{t $lang "messages.search_ph"}}" value="{{.Q}}" aria-label="{{t $lang "messages.search_aria"}}">
  <select name="status" aria-label="{{t $lang "messages.status_filter"}}">
    <option value="">{{t $lang "messages.any_status"}}</option>
    {{range list "QUEUED" "ROUTING" "DISPATCHED" "AWAITING_ACK" "SENT" "SENT_UNCONFIRMED" "DELIVERED" "FAILED" "EXPIRED" "CANCELLED"}}
      <option value="{{.}}" {{if eq . $.Status}}selected{{end}}>{{.}}</option>
    {{end}}
  </select>
  <select name="operator" aria-label="{{t $lang "messages.operator_filter"}}">
    <option value="">{{t $lang "messages.any_operator"}}</option>
    {{range list "TELKOMSEL" "INDOSAT" "XL" "AXIS" "TRI" "SMARTFREN" "UNKNOWN"}}
      <option value="{{.}}" {{if eq . $.Operator}}selected{{end}}>{{.}}</option>
    {{end}}
  </select>
</form>

<div class="split">
  <div class="loglist" id="rows">
    {{template "rows" .}}
  </div>
  <aside id="drawer" class="drawer"><p class="muted">{{t $lang "messages.select_hint"}}</p></aside>
</div>
<div id="drawer-scrim" class="drawer-scrim"></div>
{{end}}
