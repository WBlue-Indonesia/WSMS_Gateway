{{define "statusPill"}}<span class="pill {{badge .}}">{{.}}</span>{{end}}

{{define "rows"}}
{{range .Messages}}
  <tr hx-get="/admin/messages/{{.ID}}" hx-target="#drawer" style="cursor:pointer">
    <td class="mono" data-label="Time">{{fmtTime .CreatedAt}}</td>
    <td class="mono" data-label="To">{{maskMSISDN .TargetMSISDN}}</td>
    <td data-label="Operator">{{.TargetOperator}}</td>
    <td data-label="Status">{{template "statusPill" (printf "%s" .Status)}}</td>
    <td class="num" data-label="Segments">{{.Segments}}</td>
    <td class="mono muted" data-label="ID">{{shortID .ID}}</td>
  </tr>
{{else}}
  <tr><td colspan="6" class="muted">no messages</td></tr>
{{end}}
{{end}}
