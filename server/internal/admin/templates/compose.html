{{define "content"}}
<h1>Send SMS</h1>
<p class="muted">Queue a message from the console. It routes on-net (same operator) with random fallback, like the API.</p>

{{if .Sent}}<div class="callout">Queued — detected operator <strong>{{.Sent}}</strong>. Track it under <a href="/admin/messages">Messages</a>.</div>{{end}}
{{if .Error}}<div class="err">{{.Error}}</div>{{end}}

<div class="card compose-card">
  <form method="post" action="/admin/compose" class="compose-form">
    <label>Destination number
      <input name="to" inputmode="tel" placeholder="0812-3456-7890 or +6281..." autocomplete="off" required>
    </label>
    <label>Message
      <textarea name="message" rows="4" placeholder="Type the SMS…" required></textarea>
    </label>
    <div class="row2">
      <label>Routing
        <select name="routing_policy">
          <option value="ON_NET_PREF">On-net preferred (fallback allowed)</option>
          <option value="ON_NET_STRICT">On-net strict (no fallback)</option>
          <option value="ANY">Any SIM</option>
        </select>
      </label>
      <label>TTL (seconds)
        <input name="ttl_seconds" inputmode="numeric" placeholder="default" autocomplete="off">
      </label>
    </div>
    <button type="submit" class="primary">Send</button>
  </form>
</div>
{{end}}
