# Production compose: Postgres + the gateway + Caddy (TLS termination + wss proxy).
# Secrets come from .env (gitignored) and ./secrets/ (gitignored); see .env.example.
services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wsms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wsms}
      POSTGRES_DB: ${POSTGRES_DB:-wsms}
    volumes:
      - wsms_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wsms}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  server:
    build: .
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      # Point the DB URL at the compose service; other vars come from .env.
      WSMS_DATABASE_URL: "postgres://${POSTGRES_USER:-wsms}:${POSTGRES_PASSWORD:-wsms}@db:5432/${POSTGRES_DB:-wsms}?sslmode=disable"
      WSMS_HTTP_ADDR: ":8080"
    volumes:
      # FCM service-account (read-only). WSMS_FCM_CREDENTIALS in .env = /secrets/fcm.json
      - ./secrets:/secrets:ro
    expose:
      - "8080"
    restart: unless-stopped

  # TLS + WebSocket proxy. Auto-HTTPS when WSMS_DOMAIN is a real hostname.
  # For local testing set WSMS_DOMAIN=:80 (plain HTTP) and hit http://localhost.
  caddy:
    image: caddy:2-alpine
    depends_on:
      - server
    environment:
      WSMS_DOMAIN: ${WSMS_DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  wsms_pg:
  caddy_data:
  caddy_config:
