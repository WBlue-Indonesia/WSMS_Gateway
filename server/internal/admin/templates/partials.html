{{define "statusPill"}}<span class="pill {{badge .}}">{{.}}</span>{{end}}

{{define "rows"}}
{{range .Messages}}
  <tr class="logrow" hx-get="/admin/messages/{{.ID}}" hx-target="#drawer" hx-swap="innerHTML">
    <td class="mono" data-label="Time"><span class="st-dot {{badge (printf "%s" .Status)}}"></span>{{fmtTime .CreatedAt}}</td>
    <td class="mono" data-label="To">{{maskMSISDN .TargetMSISDN}}</td>
    <td data-label="Operator"><span class="pill muted plain">{{.TargetOperator}}</span></td>
    <td data-label="Status">{{template "statusPill" (printf "%s" .Status)}}</td>
    <td class="num" data-label="Seg">{{.Segments}}</td>
    <td class="mono muted" data-label="ID">{{shortID .ID}}</td>
  </tr>
{{else}}
  <tr><td colspan="6" class="muted">no messages match</td></tr>
{{end}}
{{end}}
