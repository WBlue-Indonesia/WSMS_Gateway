name: wsms_sender
description: "WSMS-Gateway Android sender — receives send commands over WebSocket and sends SMS via dual-SIM."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  permission_handler: ^12.0.0
  flutter_foreground_task: ^8.10.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  mobile_scanner: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
