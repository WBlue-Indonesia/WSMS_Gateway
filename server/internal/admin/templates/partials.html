{{define "statusPill"}}<span class="pill {{badge .}}">{{.}}</span>{{end}}

{{define "rows"}}
{{range .Messages}}
  <div class="logitem" hx-get="/admin/messages/{{.ID}}" hx-target="#drawer" hx-swap="innerHTML" role="button" tabindex="0">
    <span class="li-lead {{badge (printf "%s" .Status)}}">{{statusIcon (printf "%s" .Status)}}</span>
    <div class="li-body">
      <div class="li-title mono">{{.TargetMSISDN}}</div>
      <div class="li-sub">{{.TargetOperator}}</div>
    </div>
    <div class="li-trail">
      <span class="li-time mono">{{fmtShort .CreatedAt}}</span>
      <svg class="li-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
    </div>
  </div>
{{else}}
  <div class="logempty muted">no messages match</div>
{{end}}
{{end}}
